# ================================================================
# Nginx – Configuración para suempresa.com
# ================================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name suempresa.com www.suempresa.com;

    # Desafío ACME para Let's Encrypt / Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────
# HTTPS principal
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name suempresa.com www.suempresa.com;

    # ── Certificados SSL (Let's Encrypt via Certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/suempresa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suempresa.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Cabeceras de seguridad ────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                     always;
    add_header X-Frame-Options           "DENY"                                        always;
    add_header X-XSS-Protection          "1; mode=block"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;

    # ── Tamaño máximo de subida (imágenes de productos) ──────
    client_max_body_size 50M;

    # ── Archivos estáticos de Next.js (_next/static) ─────────
    location /_next/static/ {
        proxy_pass http://app:3000/_next/static/;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Archivos subidos por el usuario ──────────────────────
    location /uploads/ {
        proxy_pass http://app:3000/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Todo lo demás → Next.js ───────────────────────────────
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
